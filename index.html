<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Vendor Directory</title>
<style>
body {
  margin: 0;
  padding: 12px;
  background: #f5f7fb;
  color: #17212b;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
}
* { box-sizing: border-box; }
.wrap { max-width: 1280px; margin: 0 auto; }
.panel {
  background: #fff;
  border: 1px solid #d8e0ea;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 14px;
}
h1 { margin: 0 0 8px; font-size: 28px; }
p { margin: 0; color: #5f6c7b; line-height: 1.4; }
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-top: 12px;
}
input, select {
  width: 100%;
  padding: 11px 12px;
  border: 1px solid #cfd8e3;
  border-radius: 12px;
  background: #fff;
  color: #17212b;
  font: inherit;
  -webkit-appearance: none;
  appearance: none;
}
button {
  padding: 10px 12px;
  border: 1px solid #cfd8e3;
  border-radius: 12px;
  background: #fff;
  font: inherit;
}
.actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
.stats { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.stat {
  background: #eef3fb;
  padding: 8px 10px;
  border-radius: 999px;
  font-size: 13px;
}
.cards { display: grid; gap: 12px; }
.card {
  background: #fff;
  border: 1px solid #d8e0ea;
  border-radius: 16px;
  padding: 14px;
}
.card h3 { margin: 0 0 6px; font-size: 20px; }
.meta { color: #5f6c7b; font-size: 13px; margin-bottom: 10px; }
.row { margin: 8px 0; }
.label { color: #5f6c7b; font-size: 13px; margin-bottom: 3px; }
.value { line-height: 1.4; word-break: break-word; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  background: #eef2f7;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
}
.empty {
  padding: 20px;
  color: #5f6c7b;
  background: #fff;
  border: 1px solid #d8e0ea;
  border-radius: 16px;
}
table { width: 100%; border-collapse: collapse; min-width: 980px; }
th, td {
  border-bottom: 1px solid #e4e9f0;
  text-align: left;
  vertical-align: top;
  padding: 10px 12px;
}
th {
  position: sticky;
  top: 0;
  background: #fbfcfe;
  color: #5f6c7b;
  font-size: 13px;
}
.desktop { display: none; overflow: auto; -webkit-overflow-scrolling: touch; }
a { color: #2457d6; text-decoration: none; }
@media (min-width: 960px) {
  body { padding: 18px; }
  .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .desktop { display: block; }
  .mobile { display: none; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <h1>Vendor Directory</h1>
    <p>Ultra-compatible standalone build for local file use. No localStorage, no JSON import/export, no Blob downloads, no dynamic regular expressions.</p>
    <div class="grid">
      <input id="search" type="text" placeholder="Search all fields">
      <select id="category"></select>
      <select id="subcategory"></select>
      <select id="vendor"></select>
      <select id="contact"></select>
      <select id="offering"></select>
    </div>
    <div class="actions">
      <button id="clearBtn" type="button">Clear filters</button>
    </div>
    <div class="stats">
      <div class="stat"><span id="visibleCount">0</span> visible</div>
      <div class="stat"><span id="totalCount">0</span> total</div>
    </div>
  </div>

  <div id="desktop" class="panel desktop">
    <table>
      <thead>
        <tr>
          <th>Vendor</th>
          <th>Category</th>
          <th>Subcategory</th>
          <th>Offerings</th>
          <th>Contact</th>
          <th>Phone</th>
          <th>Mobile</th>
          <th>Email</th>
          <th>Website</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div id="mobile" class="mobile cards"></div>
  <div id="empty" class="empty" style="display:none;">No matching records.</div>
</div>

<script>
(function () {
  var raw = document.getElementById('records-data').textContent || '[]';
  var records = JSON.parse(raw);
  var filtered = records.slice(0);

  function el(id) {
    return document.getElementById(id);
  }

  function txt(v) {
    return v === null || v === undefined ? '' : String(v);
  }

  function esc(v) {
    return txt(v)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function uniq(arr) {
    var m = {};
    var out = [];
    var i, v;
    for (i = 0; i < arr.length; i++) {
      v = txt(arr[i]).replace(/^\s+|\s+$/g, '');
      if (v && !m[v]) {
        m[v] = true;
        out.push(v);
      }
    }
    out.sort();
    return out;
  }

  function offeringsText(r) {
    var arr = r.offerings && r.offerings.join ? r.offerings : [];
    return arr.join(' • ');
  }

  function blob(r) {
    return [
      txt(r.category), txt(r.subcategory), txt(r.vendor), txt(r.contact),
      txt(r.phone), txt(r.mobile), txt(r.email), txt(r.website),
      txt(r.notes), offeringsText(r)
    ].join(' | ').toLowerCase();
  }

  function setOptions(select, first, values) {
    var current = select.value || '';
    var html = '<option value="">' + esc(first) + '</option>';
    var i, v;
    for (i = 0; i < values.length; i++) {
      v = values[i];
      html += '<option value="' + esc(v) + '"' + (v === current ? ' selected' : '') + '>' + esc(v) + '</option>';
    }
    select.innerHTML = html;
  }

  function populate() {
    setOptions(el('category'), 'All categories', uniq(records.map(function(r){return r.category;})));
    setOptions(el('subcategory'), 'All subcategories', uniq(records.map(function(r){return r.subcategory;})));
    setOptions(el('vendor'), 'All vendors', uniq(records.map(function(r){return r.vendor;})));
    setOptions(el('contact'), 'All contacts', uniq(records.map(function(r){return r.contact;})));

    var offers = [];
    var i, j, arr;
    for (i = 0; i < records.length; i++) {
      arr = records[i].offerings || [];
      for (j = 0; j < arr.length; j++) {
        offers.push(arr[j]);
      }
    }
    setOptions(el('offering'), 'All offerings', uniq(offers));
  }

  function applyFilters() {
    var q = txt(el('search').value).toLowerCase();
    var c = txt(el('category').value);
    var s = txt(el('subcategory').value);
    var v = txt(el('vendor').value);
    var ct = txt(el('contact').value);
    var o = txt(el('offering').value);

    filtered = records.filter(function (r) {
      var ok = true;
      if (q && blob(r).indexOf(q) === -1) ok = false;
      if (c && txt(r.category) !== c) ok = false;
      if (s && txt(r.subcategory) !== s) ok = false;
      if (v && txt(r.vendor) !== v) ok = false;
      if (ct && txt(r.contact) !== ct) ok = false;
      if (o) {
        var found = false;
        var arr = r.offerings || [];
        for (var i = 0; i < arr.length; i++) {
          if (txt(arr[i]) === o) {
            found = true;
            break;
          }
        }
        if (!found) ok = false;
      }
      return ok;
    });
    render();
  }

  function render() {
    var tableHtml = '';
    var cardsHtml = '';
    var i, r, offers, j, emailHtml, webHtml;

    for (i = 0; i < filtered.length; i++) {
      r = filtered[i];
      emailHtml = r.email ? '<a href="mailto:' + esc(r.email) + '">' + esc(r.email) + '</a>' : '';
      webHtml = r.website ? esc(r.website) : '';
      tableHtml += '<tr>' +
        '<td>' + esc(r.vendor) + '</td>' +
        '<td>' + esc(r.category) + '</td>' +
        '<td>' + esc(r.subcategory) + '</td>' +
        '<td>' + esc(offeringsText(r)) + '</td>' +
        '<td>' + esc(r.contact) + '</td>' +
        '<td>' + esc(r.phone) + '</td>' +
        '<td>' + esc(r.mobile) + '</td>' +
        '<td>' + emailHtml + '</td>' +
        '<td>' + webHtml + '</td>' +
        '<td>' + esc(r.notes) + '</td>' +
      '</tr>';

      offers = '';
      if (r.offerings && r.offerings.length) {
        for (j = 0; j < r.offerings.length; j++) {
          offers += '<span class="chip">' + esc(r.offerings[j]) + '</span>';
        }
      }
      cardsHtml += '<div class="card">' +
        '<h3>' + esc(r.vendor) + '</h3>' +
        '<div class="meta">' + esc(r.category) + ' • ' + esc(r.subcategory) + '</div>' +
        '<div class="row"><div class="label">Offerings</div><div class="value"><div class="chips">' + (offers || '<span class="chip">—</span>') + '</div></div></div>' +
        '<div class="row"><div class="label">Contact</div><div class="value">' + esc(r.contact) + '</div></div>' +
        '<div class="row"><div class="label">Phone</div><div class="value">' + esc(r.phone) + '</div></div>' +
        '<div class="row"><div class="label">Mobile</div><div class="value">' + esc(r.mobile) + '</div></div>' +
        '<div class="row"><div class="label">Email</div><div class="value">' + emailHtml + '</div></div>' +
        '<div class="row"><div class="label">Website</div><div class="value">' + webHtml + '</div></div>' +
        '<div class="row"><div class="label">Notes</div><div class="value">' + esc(r.notes) + '</div></div>' +
      '</div>';
    }

    el('tableBody').innerHTML = tableHtml;
    el('mobile').innerHTML = cardsHtml;
    el('visibleCount').textContent = String(filtered.length);
    el('totalCount').textContent = String(records.length);
    el('empty').style.display = filtered.length ? 'none' : 'block';
    el('desktop').style.display = window.innerWidth >= 960 ? 'block' : 'none';
  }

  function bind() {
    var ids = ['search','category','subcategory','vendor','contact','offering'];
    for (var i = 0; i < ids.length; i++) {
      var node = el(ids[i]);
      node.addEventListener(ids[i] === 'search' ? 'input' : 'change', applyFilters);
    }
    el('clearBtn').addEventListener('click', function () {
      el('search').value = '';
      el('category').value = '';
      el('subcategory').value = '';
      el('vendor').value = '';
      el('contact').value = '';
      el('offering').value = '';
      applyFilters();
    });
    window.addEventListener('resize', render);
  }

  populate();
  bind();
  render();
}());
</script>
