<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="format-detection" content="telephone=no,email=no,address=no">

<title>Vendor Directory</title>
<style>
:root {
  --bg: #eef3f7;
  --surface: rgba(255,255,255,0.94);
  --surface-solid: #ffffff;
  --surface-2: #f7fafc;
  --text: #183246;
  --muted: #60758a;
  --line: #d8e3ea;
  --line-strong: #bdd0dc;
  --brand: #ff0000;
  --brand-2: #000000;
  --brand-soft: #e4f7fb;
  --shadow: 0 10px 30px rgba(24, 50, 70, 0.08);
  --radius: 18px;
  --radius-sm: 12px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background:
    radial-gradient(circle at top right, rgba(0, 167, 200, 0.08), transparent 24rem),
    linear-gradient(180deg, #f8fbfd 0%, var(--bg) 100%);
  color: var(--text);
  font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
  padding: 16px;
}
a {
  color: inherit;
  text-decoration: none;
}
.wrap {
  max-width: 1760px;
  margin: 0 auto;
}
.panel {
  background: var(--surface);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(189, 208, 220, 0.9);
  border-radius: 24px;
  box-shadow: var(--shadow);
}
.hero {
  padding: 22px;
  margin-bottom: 16px;
  overflow: hidden;
  position: relative;
}
.hero::after {
  content: "";
  position: absolute;
  right: -80px;
  top: -80px;
  width: 260px;
  height: 260px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,167,200,0.18), rgba(0,167,200,0) 70%);
  pointer-events: none;
}
h1 {
  margin: 0 0 6px;
  font-size: clamp(28px, 4vw, 40px);
  line-height: 1.05;
  letter-spacing: -0.03em;
}
.subhead {
  margin: 0;
  color: var(--muted);
  max-width: 900px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 12px;
  margin-top: 18px;
}
input, select, button { font: inherit; }
input, select {
  width: 100%;
  min-height: 46px;
  padding: 11px 14px;
  border: 1px solid var(--line-strong);
  border-radius: 14px;
  background: var(--surface-solid);
  color: var(--text);
  outline: none;
  transition: border-color 0.18s ease, box-shadow 0.18s ease;
  -webkit-appearance: none;
  appearance: none;
}
input:focus, select:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 4px rgba(0, 167, 200, 0.12);
}
.actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 16px;
}
button {
  min-height: 44px;
  padding: 10px 14px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  background: linear-gradient(180deg, #fff 0%, #f8fbfd 100%);
  color: var(--text);
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(24, 50, 70, 0.05);
}
button:hover { border-color: var(--brand); }
.stats {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 16px;
}
.stat {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid rgba(0, 167, 200, 0.16);
  background: var(--brand-soft);
  color: var(--brand-2);
  padding: 9px 12px;
  border-radius: 999px;
  font-weight: 600;
}
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 16px;
}
.card {
  padding: 18px;
}
.card-head {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}
.card h3 {
  margin: 0;
  font-size: 24px;
  line-height: 1.1;
  letter-spacing: -0.02em;
}
.vendor-mark {
  width: 10px;
  min-width: 10px;
  height: 42px;
  border-radius: 999px;
  background: linear-gradient(180deg, var(--brand) 0%, var(--brand-2) 100%);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
}
.row {
  margin-top: 14px;
}
.label {
  color: var(--brand-2);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 7px;
  font-weight: 700;
}
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.chip, .chip-link {
  display: inline-flex;
  align-items: center;
  max-width: 100%;
  min-height: 30px;
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid rgba(0, 167, 200, 0.22);
  background: linear-gradient(180deg, #ffffff 0%, #ff8888 100%);
  color: var(--brand-2);
  font-size: 12px;
  font-weight: 600;
  line-height: 1.35;
  white-space: normal;
  word-break: break-word;
  overflow-wrap: anywhere;
}
.chip-link:hover {
  border-color: var(--brand);
  background: linear-gradient(180deg, #ffffff 0%, #ff8888 100%);
}
.chip.empty-chip {
  background: #ff8888;
  border-color: #ff0000;
  color: var(--muted);
}
.chip.offering {
  background: linear-gradient(180deg, #ffffff 0%, #ff8888 100%);
}
.chip.phone {
  background: linear-gradient(180deg, #ffffff 0%, #ff8888 100%);
}
.chip.email {
  background: linear-gradient(180deg, #ffffff 0%, #ff8888 100%);
}
.chip.website {
  background: linear-gradient(180deg, #ffffff 0%, #ff8888 100%);
}
.empty {
  margin-top: 14px;
  padding: 24px;
  color: var(--muted);
  display: none;
}
@media (max-width: 1200px) {
  .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .cards { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
}
@media (max-width: 960px) {
  body { padding: 12px; }
  .hero { padding: 18px; }
  .grid { grid-template-columns: 1fr; }
  .cards { grid-template-columns: 1fr; }
  .card { padding: 16px; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel hero">
    <h1>Vendor Directory</h1>
    <p class="subhead">Search and filter across vendors, offerings, contacts, phone numbers, websites, and notes. Optimized for desktop and mobile cards.</p>
    <div class="grid">
      <input id="search" type="text" placeholder="Search all fields">
      <select id="category"></select>
      <select id="subcategory"></select>
      <select id="vendor"></select>
      <select id="contact"></select>
      <select id="offering"></select>
    </div>
    <div class="actions">
      <button id="clearBtn" type="button">Clear filters</button>
    </div>
    <div class="stats">
      <div class="stat"><span id="visibleCount">0</span> visible</div>
      <div class="stat"><span id="totalCount">0</span> total</div>
    </div>
  </div>

  <div id="cards" class="cards"></div>
  <div id="empty" class="panel empty">No matching records.</div>
</div>

<script>
(function () {
  var raw = document.getElementById('records-data').textContent || '[]';
  var records = JSON.parse(raw);

  function el(id) {
    return document.getElementById(id);
  }

  function toArray(v) {
    if (Array.isArray(v)) return v;
    if (v === null || v === undefined || v === '') return [];
    return [v];
  }

  function text(v) {
    return v === null || v === undefined ? '' : String(v);
  }

  function esc(v) {
    return text(v)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function uniq(values) {
    var seen = Object.create(null);
    var out = [];
    for (var i = 0; i < values.length; i++) {
      var value = text(values[i]).trim();
      if (value && !seen[value]) {
        seen[value] = true;
        out.push(value);
      }
    }
    out.sort(function(a, b) { return a.localeCompare(b); });
    return out;
  }

  function normalizeWebsite(url) {
    var u = text(url).trim();
    if (!u) return '';
    if (u.indexOf('http://') !== 0 && u.indexOf('https://') !== 0) {
      u = 'https://' + u.replace(/^\/+/, '');
    }
    return u.replace('https://www/', 'https://www.');
  }

  function formatPhone(value) {
    var raw = text(value).trim();
    if (!raw || raw === 'XXX-XXX-XXXX') return raw;
    if (raw.indexOf('+') === 0 && raw.indexOf('+1') !== 0) return raw;
    var digits = raw.replace(/\D/g, '');
    if (digits.length === 10) {
      return '+1 ' + digits.slice(0, 3) + '-' + digits.slice(3, 6) + '-' + digits.slice(6);
    }
    if (digits.length === 11 && digits.charAt(0) === '1') {
      return '+1 ' + digits.slice(1, 4) + '-' + digits.slice(4, 7) + '-' + digits.slice(7);
    }
    return raw;
  }

  function telHref(value) {
    return 'tel:' + text(value).replace(/[^\d+]/g, '');
  }

  function compactLabelFromUrl(url) {
    var clean = text(url).replace(/^https?:\/\//, '').replace(/^www\./, '').replace(/\/$/, '');
    return clean || text(url);
  }

  function prepRecord(r) {
    r.website = normalizeWebsite(r.website);
    r.phone = Array.isArray(r.phone) ? r.phone.map(formatPhone) : formatPhone(r.phone);
    r.mobile = Array.isArray(r.mobile) ? r.mobile.map(formatPhone) : formatPhone(r.mobile);
    return r;
  }

  for (var i = 0; i < records.length; i++) {
    prepRecord(records[i]);
  }

  function flattenField(v) {
    return toArray(v).join(' | ');
  }

  function offeringsText(r) {
    return toArray(r.offerings).join(' • ');
  }

  function searchBlob(r) {
    return [
      r.category,
      r.subcategory,
      r.vendor,
      flattenField(r.contact),
      flattenField(r.phone),
      flattenField(r.mobile),
      flattenField(r.email),
      r.website,
      r.notes,
      offeringsText(r)
    ].join(' | ').toLowerCase();
  }

  function setOptions(select, label, values) {
    var current = select.value || '';
    var html = '<option value="">' + esc(label) + '</option>';
    for (var i = 0; i < values.length; i++) {
      var value = values[i];
      html += '<option value="' + esc(value) + '"' + (value === current ? ' selected' : '') + '>' + esc(value) + '</option>';
    }
    select.innerHTML = html;
  }

  function collectValues(field) {
    var values = [];
    for (var i = 0; i < records.length; i++) {
      var arr = toArray(records[i][field]);
      for (var j = 0; j < arr.length; j++) values.push(arr[j]);
    }
    return uniq(values);
  }

  function populateFilters() {
    setOptions(el('category'), 'All categories', collectValues('category'));
    setOptions(el('subcategory'), 'All subcategories', collectValues('subcategory'));
    setOptions(el('vendor'), 'All vendors', collectValues('vendor'));
    setOptions(el('contact'), 'All contacts', collectValues('contact'));
    var offeringValues = [];
    for (var i = 0; i < records.length; i++) offeringValues = offeringValues.concat(toArray(records[i].offerings));
    setOptions(el('offering'), 'All offerings', uniq(offeringValues));
  }

  function hasMatch(field, selected) {
    if (!selected) return true;
    var values = toArray(field);
    for (var i = 0; i < values.length; i++) {
      if (text(values[i]) === selected) return true;
    }
    return false;
  }

  function chip(textValue, className) {
    return '<span class="chip ' + (className || '') + '">' + esc(textValue) + '</span>';
  }

  function linkChip(textValue, href, className) {
    return '<a class="chip-link ' + (className || '') + '" href="' + esc(href) + '" target="_blank" rel="noopener noreferrer">' + esc(textValue) + '</a>';
  }

  function renderChipGroup(values, className, emptyLabel) {
    var arr = toArray(values);
    if (!arr.length) return '<div class="chips"><span class="chip empty-chip">' + esc(emptyLabel || '—') + '</span></div>';
    var out = '<div class="chips">';
    for (var i = 0; i < arr.length; i++) out += chip(arr[i], className);
    return out + '</div>';
  }

  function renderPhoneChips(values, emptyLabel) {
    var arr = toArray(values);
    if (!arr.length) return '<div class="chips"><span class="chip empty-chip">' + esc(emptyLabel || '—') + '</span></div>';
    var out = '<div class="chips">';
    for (var i = 0; i < arr.length; i++) {
      var v = text(arr[i]).trim();
      if (!v || v === 'XXX-XXX-XXXX') out += '<span class="chip empty-chip">—</span>';
      else out += '<a class="chip-link phone" href="' + esc(telHref(v)) + '">' + esc(v) + '</a>';
    }
    return out + '</div>';
  }

  function renderEmailChips(values, emptyLabel) {
    var arr = toArray(values);
    if (!arr.length) return '<div class="chips"><span class="chip empty-chip">' + esc(emptyLabel || '—') + '</span></div>';
    var out = '<div class="chips">';
    for (var i = 0; i < arr.length; i++) {
      var v = text(arr[i]).trim();
      if (!v) out += '<span class="chip empty-chip">—</span>';
      else out += '<a class="chip-link email" href="mailto:' + esc(v) + '">' + esc(v) + '</a>';
    }
    return out + '</div>';
  }

  function renderWebsiteChip(value) {
    var url = text(value).trim();
    if (!url) return '<div class="chips"><span class="chip empty-chip">—</span></div>';
    return '<div class="chips">' + linkChip(compactLabelFromUrl(url), url, 'website') + '</div>';
  }

  function renderNotesChip(value) {
    var v = text(value).trim();
    if (!v) return '<div class="chips"><span class="chip empty-chip">—</span></div>';
    return '<div class="chips">' + chip(v, '') + '</div>';
  }

  function filterRecords() {
    var q = text(el('search').value).toLowerCase().trim();
    var category = text(el('category').value);
    var subcategory = text(el('subcategory').value);
    var vendor = text(el('vendor').value);
    var contact = text(el('contact').value);
    var offering = text(el('offering').value);

    return records.filter(function (r) {
      if (q && searchBlob(r).indexOf(q) === -1) return false;
      if (!hasMatch(r.category, category)) return false;
      if (!hasMatch(r.subcategory, subcategory)) return false;
      if (!hasMatch(r.vendor, vendor)) return false;
      if (!hasMatch(r.contact, contact)) return false;
      if (!hasMatch(r.offerings, offering)) return false;
      return true;
    });
  }

  function renderCard(r) {
    return ''
      + '<article class="panel card">'
      +   '<div class="card-head">'
      +     '<div><h3>' + esc(r.vendor) + '</h3></div>'
      +     '<div class="vendor-mark" aria-hidden="true"></div>'
      +   '</div>'
      +   '<div class="row"><div class="label">Category</div>' + renderChipGroup(r.category, '') + '</div>'
      +   '<div class="row"><div class="label">Subcategory</div>' + renderChipGroup(r.subcategory, '') + '</div>'
      +   '<div class="row"><div class="label">Offerings</div>' + renderChipGroup(r.offerings, 'offering') + '</div>'
      +   '<div class="row"><div class="label">Contact</div>' + renderChipGroup(r.contact, '') + '</div>'
      +   '<div class="row"><div class="label">Phone</div>' + renderPhoneChips(r.phone) + '</div>'
      +   '<div class="row"><div class="label">Mobile</div>' + renderPhoneChips(r.mobile) + '</div>'
      +   '<div class="row"><div class="label">Email</div>' + renderEmailChips(r.email) + '</div>'
      +   '<div class="row"><div class="label">Website</div>' + renderWebsiteChip(r.website) + '</div>'
      +   '<div class="row"><div class="label">Notes</div>' + renderNotesChip(r.notes) + '</div>'
      + '</article>';
  }

  function render() {
    var filtered = filterRecords();
    var cardsHtml = '';
    for (var i = 0; i < filtered.length; i++) cardsHtml += renderCard(filtered[i]);
    el('cards').innerHTML = cardsHtml;
    el('visibleCount').textContent = String(filtered.length);
    el('totalCount').textContent = String(records.length);
    el('empty').style.display = filtered.length ? 'none' : 'block';
  }

  function bind() {
    var ids = ['search', 'category', 'subcategory', 'vendor', 'contact', 'offering'];
    for (var i = 0; i < ids.length; i++) {
      el(ids[i]).addEventListener(ids[i] === 'search' ? 'input' : 'change', render);
    }
    el('clearBtn').addEventListener('click', function () {
      el('search').value = '';
      el('category').value = '';
      el('subcategory').value = '';
      el('vendor').value = '';
      el('contact').value = '';
      el('offering').value = '';
      render();
    });
  }

  populateFilters();
  bind();
  render();
}());
</script>
